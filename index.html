<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fulgi Flavia Forever</title>
    <!-- Social share preview (Open Graph + Twitter Card).
         Drop a preview.png (1200×630 px) next to index.html. -->
    <meta property="og:title" content="Fulgi Flavia Forever">
    <meta property="og:description" content="Spit the boxes, jump the corn. Say PTIU!">
    <meta property="og:image" content="https://flaviadbr.github.io/Fulgi/preview.png">
    <meta property="og:url" content="https://flaviadbr.github.io/Fulgi/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Fulgi Flavia Forever">
    <meta name="twitter:description" content="Spit the boxes, jump the corn. Say PTIU!">
    <meta name="twitter:image" content="https://flaviadbr.github.io/Fulgi/preview.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:ital,wght@0,400;0,700&family=Spicy+Rice&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #111;
            overflow: hidden;
            font-family: 'Intel One Mono', 'Courier New', monospace;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            transform-origin: top left;
            touch-action: none;
        }
        /* Full-screen overlay shown on mobile when entering a name after death.
           Sits above the canvas so the keyboard can't shrink the visible game. */
        #nameOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(255,255,255,0.96);
            font-family: 'Intel One Mono', 'Courier New', monospace;
            color: #111;
        }
        #nameOverlayContent {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            text-align: center;
            padding: 0 16px;
        }
        #nameTitle {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        #nameScoreText {
            font-size: 15px;
            color: #444;
            margin-bottom: 12px;
        }
        #nameRow {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: stretch;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        #mobileNameInput {
            font-family: inherit;
            font-size: 18px;     /* ≥16px keeps iOS from auto-zooming on focus */
            padding: 8px 12px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #f9f9f9;
            color: #111;
            outline: none;
            width: 220px;
            text-align: center;
        }
        #doneBtn {
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #111;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
        }
        #nameHint {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <canvas id="game" width="900" height="420"></canvas>
    <div id="nameOverlay">
        <div id="nameOverlayContent">
            <div id="nameTitle">SPLAT!</div>
            <div id="nameScoreText">You splatted 0 boxes</div>
            <div id="nameRow">
                <input id="mobileNameInput" type="text" maxlength="15" placeholder="your name…" autocomplete="off" autocorrect="off" spellcheck="false">
                <button id="doneBtn" type="button">Done ✓</button>
            </div>
            <div id="nameHint">Tap outside the box to skip</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = 900, H = 420;

        // Render at full Retina/HiDPI resolution
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        ctx.scale(dpr, dpr); // all drawing uses logical px — canvas handles the rest
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // Scale canvas to fill window while preserving 900×420 aspect ratio.
        // Uses window.innerWidth/Height — these stay stable when the on-screen
        // keyboard opens, so the canvas doesn't shrink during name entry.
        function fitToWindow() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const scale  = Math.min(vw / W, vh / H);
            const scaledW = Math.floor(W * scale);
            const scaledH = Math.floor(H * scale);
            canvas.style.width  = scaledW + 'px';
            canvas.style.height = scaledH + 'px';
            canvas.style.left   = Math.floor((vw - scaledW) / 2) + 'px';
            canvas.style.top    = Math.floor((vh - scaledH) / 2) + 'px';
            canvas.style.transform = '';
        }
        fitToWindow();
        window.addEventListener('resize', fitToWindow);
        // Orientation change: browser needs ~300 ms to update its dimensions
        window.addEventListener('orientationchange', () => setTimeout(fitToWindow, 300));
        const FONT = '"Intel One Mono", "Courier New", monospace';

        // roundRect polyfill for older mobile Safari / Chrome
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                r = Math.min(r, w / 2, h / 2);
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.arcTo(x + w, y, x + w, y + r, r);
                this.lineTo(x + w, y + h - r);
                this.arcTo(x + w, y + h, x + w - r, y + h, r);
                this.lineTo(x + r, y + h);
                this.arcTo(x, y + h, x, y + h - r, r);
                this.lineTo(x, y + r);
                this.arcTo(x, y, x + r, y, r);
                this.closePath();
                return this;
            };
        }

        // --- Assets ---
        function img(src) { const i = new Image(); i.src = src; return i; }
        const llamaImg  = img('lama.png');
        const boxBefore = img('box_before.png');
        const boxAfter  = img('box_after.png');
        const salivaImg = img('saliva.png');
        const floorImg  = img('floor.png');

        // Background: loaded manually so we can build a seamless mirror-tile on load
        let bgPattern = null, bgTileW = 0;
        const bgImg = new Image();
        bgImg.onload = () => {
            const scaleH  = H / bgImg.naturalHeight;
            const scaledW = Math.round(bgImg.naturalWidth * scaleH);
            bgTileW = scaledW * 2; // image + mirror = one seamless tile
            const tile = document.createElement('canvas');
            tile.width = bgTileW; tile.height = H;
            const tctx = tile.getContext('2d');
            tctx.drawImage(bgImg, 0, 0, scaledW, H);          // normal
            tctx.save();
            tctx.translate(bgTileW, 0); tctx.scale(-1, 1);
            tctx.drawImage(bgImg, 0, 0, scaledW, H);           // mirrored
            tctx.restore();
            bgPattern = ctx.createPattern(tile, 'repeat-x');
        };
        bgImg.src = 'bg.jpg';
        const cornImg      = img('obstacle.svg');
        const doofImg      = img('doof.png');
        const cowboyImg    = img('cowboy-.png');
        const alienImg     = img('alien-.png');
        const agentImg     = img('secret_agent-.png');
        const techBroImg   = img('tech_bro-.png');
        const minionsImg   = img('minions-.png');

        const jumpBtnImg = img('jump_button.png');

        // All images that must be attempted before the game starts
        const allImages = [llamaImg, boxBefore, boxAfter, salivaImg, floorImg,
                           bgImg, cornImg, doofImg, cowboyImg, alienImg,
                           agentImg, techBroImg, minionsImg, jumpBtnImg];

        // --- Floor layout ---
        const SVG_W = 9617.07, SVG_H = 1256.21;
        const FLOOR_H = 240;
        const FLOOR_Y = H - FLOOR_H;                       // = 180
        const FLOOR_W = Math.round(9618 * FLOOR_H / 1257); // ≈ 1837

        // --- Ground LUT from SVG trajectory (15 relative cubic bezier segments) ---
        const TRAJ_SEGS = [
            [56.25,1.13,   142.82,1.3,    248.71,-5.19],
            [86.68,-5.31,  149.61,-12.83, 169.51,-15.08],
            [188.93,-21.34,407.62,-8.94,  580.45,0],
            [0,0,          126.17,6.53,   696.77,30.49],
            [268.72,11.29, 281.92,7.54,   721.61,20.33],
            [505.15,14.69, 757.72,22.03,  956.51,35.01],
            [430.52,28.11, 482.84,51.83,  966.67,77.92],
            [276.85,14.93, 434.86,16.61,  577.09,14.1],
            [177.72,-3.13, 310.28,-12.44, 555.9,-30.05],
            [329.94,-23.65,416.69,-36.3,  647.42,-53.95],
            [98.75,-7.55,  219.03,-15.65, 792.9,-37.57],
            [553.31,-21.14,523.88,-16.41, 1065.55,-36.9],
            [524.77,-19.85,679.21,-29.41, 920.99,-28.73],
            [42.21,0.12,   225.54,0.94,   478.98,0],
            [100.22,-0.37, 182.79,-0.92,  238,-1.33],
        ];
        const LUT_SIZE = Math.ceil(SVG_W) + 2;
        const groundLUT = (() => {
            const lut = new Float32Array(LUT_SIZE);
            let cx = 0, cy = 347.62;
            for (const [dx1,dy1,dx2,dy2,dx,dy] of TRAJ_SEGS) {
                const p0x=cx, p0y=cy, p1x=cx+dx1, p1y=cy+dy1,
                      p2x=cx+dx2, p2y=cy+dy2, p3x=cx+dx, p3y=cy+dy;
                const steps = Math.ceil(Math.abs(dx) * 20);
                for (let i = 0; i <= steps; i++) {
                    const t=i/steps, u=1-t;
                    const bx=u*u*u*p0x+3*u*u*t*p1x+3*u*t*t*p2x+t*t*t*p3x;
                    const by=u*u*u*p0y+3*u*u*t*p1y+3*u*t*t*p2y+t*t*t*p3y;
                    lut[Math.max(0,Math.min(LUT_SIZE-1,Math.floor(bx)))] = by;
                }
                cx+=dx; cy+=dy;
            }
            let last = 347.62;
            for (let x = 0; x < LUT_SIZE; x++) {
                if (lut[x] !== 0) last = lut[x]; else lut[x] = last;
            }
            return lut;
        })();

        function getGroundY(worldX) {
            const tileX = ((worldX % FLOOR_W) + FLOOR_W) % FLOOR_W;
            const svgX  = tileX * (SVG_W / FLOOR_W);
            const ix    = Math.min(Math.floor(svgX), LUT_SIZE - 2);
            const svgY  = groundLUT[ix] + (groundLUT[ix+1] - groundLUT[ix]) * (svgX - ix);
            return FLOOR_Y + svgY * (FLOOR_H / SVG_H);
        }

        // --- Sprite sizes ---
        const CHAR_H=100, CHAR_W=Math.round(CHAR_H*372/614);
        const BOX_H=84,   BOX_W=Math.round(BOX_H*230/264);
        const BOX_H_AFTER=Math.round(BOX_W*275/228);
        const CORN_H=84,  CORN_W=Math.round(CORN_H*1032/2023);
        const SPIT_W=58,  SPIT_H=Math.round(SPIT_W*32/176);
        const SPIT_SPEED=11, SPIT_COOLDOWN=22;
        const ENEMY_SPEED=2.5;
        // Each entry: { img, H, W, walk }  — walk=true gets bob+lean, false glides smoothly
        const ENEMY_TYPES = [
            { img:doofImg,    H:130, W:Math.round(130*3666/8225), walk:true  }, // doof
            { img:cowboyImg,  H:130, W:Math.round(130*3840/8182), walk:true  }, // cowboy
            { img:alienImg,   H:100, W:Math.round(100*6006/5805), walk:false }, // alien
            { img:agentImg,   H:120, W:Math.round(120*5685/6873), walk:false }, // secret agent
            { img:techBroImg, H:110, W:Math.round(110*5969/4487), walk:false }, // tech bro
            { img:minionsImg, H:75,  W:Math.round(75*6077/2386),  walk:false }, // minions
        ];

        // --- Physics ---
        const WALK_SPEED=4, GRAVITY=0.55, JUMP_V=-14, CAM_OFFSET=210;

        // --- Leaderboard (Firebase Realtime DB; localStorage = offline fallback) ---
        const FB_URL = 'https://llama-db292-default-rtdb.europe-west1.firebasedatabase.app';
        let cachedBoard = [];
        // Warm-start from local cache so the screen isn't blank while online fetch resolves
        try { cachedBoard = JSON.parse(localStorage.getItem('llamaLeaderboard') || '[]'); }
        catch { cachedBoard = []; }

        function getLeaderboard() { return cachedBoard; }

        async function fetchLeaderboard() {
            try {
                const r = await fetch(`${FB_URL}/leaderboard.json?orderBy="score"&limitToLast=10`);
                const data = await r.json();
                const entries = data ? Object.values(data) : [];
                entries.sort((a, b) => b.score - a.score);
                cachedBoard = entries.slice(0, 10);
                localStorage.setItem('llamaLeaderboard', JSON.stringify(cachedBoard));
            } catch (err) {
                // Offline or Firebase unreachable — keep showing the local cache
            }
        }

        async function saveScore(name, s) {
            const entry = { name: name.trim() || 'Anonymous', score: s };
            // Optimistic local update so the new score appears instantly
            cachedBoard.push(entry);
            cachedBoard.sort((a, b) => b.score - a.score);
            if (cachedBoard.length > 10) cachedBoard.length = 10;
            localStorage.setItem('llamaLeaderboard', JSON.stringify(cachedBoard));
            // Send to Firebase, then re-fetch the authoritative top 10
            try {
                await fetch(`${FB_URL}/leaderboard.json`, {
                    method: 'POST',
                    body: JSON.stringify(entry),
                });
                fetchLeaderboard();
            } catch (err) {
                // Score is preserved locally — will not sync to global board this time
            }
        }

        // Pre-warm the cache on page load so the first leaderboard view is current
        fetchLeaderboard();

        // --- State ---
        // 'start' | 'playing' | 'name_input' | 'leaderboard'
        let state = 'start', score = 0, bestScore = 0;
        let nameInput = '', lastName = '';

        const player = { wx:210, y:0, vy:0, prevY:0, onGround:true, facingRight:true };
        let camX=0, obstacles=[], spits=[], spitCD=0, enemies=[], doofTimer=0, gameFrames=0, waveCount=0;

        // --- Walk / death animation state ---
        let walkCycle  = 0;
        let leanAngle  = 0;
        let squash     = 1.0;
        let wasOnGround = true;
        let deathSpin  = 0;

        function initPlayer() {
            player.wx=210; player.y=getGroundY(210); player.prevY=player.y;
            player.vy=0; player.onGround=true; player.facingRight=true;
        }
        function spawnObstacles() {
            obstacles=[];
            let wx=550;
            let boxCount=0;
            for (let i=0; i<600; i++) {
                const type = Math.random()<0.25?'corn':'box';
                // 20% of boxes float ~100px above ground — must jump + spit to score.
                // First 4 boxes stay grounded so the player learns the mechanic first.
                let lift = 0;
                if (type==='box') {
                    boxCount++;
                    if (boxCount > 4 && Math.random()<0.20) lift = 100;
                }
                obstacles.push({ wx, type, state:'normal', lift });
                const obsW = type==='corn' ? CORN_W : BOX_W;
                // Guarantee at least 2.3× llama widths of clear space after this obstacle
                wx += obsW + Math.ceil(2.3 * CHAR_W) + Math.random()*300;
            }
        }
        // --- Tuning knobs (all times in seconds × 60 = frames) ---
        // First wave delay:           600  (10 s)
        // Interval start  min / max:  480 / 1080  (8 s / 18 s)
        // Interval end    min / max:  240 / 480   (4 s / 8 s)  — reached after 5 min
        // Group odds: solo 45%, pair 35%, triple 20%
        // Gap between group members:  110 px
        const WAVE_FIRST  = 300;
        const WAVE_MIN_S  = 240,  WAVE_MAX_S  = 540;
        const WAVE_MIN_E  = 120,  WAVE_MAX_E  = 240;
        const WAVE_RAMP   = 18000; // frames over which difficulty scales
        const GROUP_GAP   = 110;

        function spawnWave(wx) {
            waveCount++;
            const roll = Math.random();
            const size = waveCount <= 3 ? 1 : (roll < 0.45 ? 1 : roll < 0.80 ? 2 : 3);
            // Shuffle types so no two members of the same wave are identical
            const shuffled = [...ENEMY_TYPES].sort(() => Math.random() - 0.5);
            for (let i = 0; i < size; i++) {
                const t = shuffled[i];
                const ewx = wx + i * GROUP_GAP;
                enemies.push({ wx: ewx, y: getGroundY(ewx),
                               walkCycle: 0, leanAngle: 0,
                               hit: false, vy: 0, spin: 0,
                               img: t.img, H: t.H, W: t.W, walk: t.walk });
            }
        }
        function spawnEnemy(wx) { spawnWave(wx); } // alias kept for T key
        function killPlayer() {
            player.vy = -16;
            player.onGround = false;
            deathSpin = 0;
            state = 'dying';
        }
        function enterNameInput() {
            nameInput = '';
            state = 'name_input';
            showMobileInput();
        }
        function reset() {
            initPlayer(); camX=0; score=0; spits=[]; spitCD=0;
            walkCycle=0; leanAngle=0; squash=1.0; wasOnGround=true; deathSpin=0;
            enemies=[]; doofTimer=1800; gameFrames=0; waveCount=0; // first wave after 30 s
            spawnObstacles();
            hideMobileInput();
            state='playing';
        }

        // --- Spit helper (keyboard + mic both call this) ---
        function triggerSpit() {
            if (state !== 'playing' || spitCD > 0) return;
            const dir = player.facingRight ? 1 : -1;
            const wx  = player.facingRight
                ? player.wx + CHAR_W/2
                : player.wx - CHAR_W/2 - SPIT_W;
            spits.push({ wx, y: player.y - CHAR_H*0.60, dir, fading: false, alpha: 1.0 });
            spitCD = SPIT_COOLDOWN;
        }

        // --- Microphone: sharp sound spike → spit (Web Audio API, <30ms latency) ---
        // Released when the tab is hidden and re-acquired on return, so the mic
        // indicator doesn't stay on after the user switches away.
        let micState = 'off';
        let micStream = null;   // MediaStream — null when stopped
        let micCtx    = null;   // AudioContext
        let micRafId  = 0;      // tick() RAF id
        function startMic() {
            if (micStream) return; // already running
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(stream => {
                    micStream = stream;
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    const actx     = new AudioCtx();
                    micCtx = actx;
                    const analyser = actx.createAnalyser();
                    analyser.fftSize = 1024;
                    analyser.smoothingTimeConstant = 0.0;
                    actx.createMediaStreamSource(stream).connect(analyser);

                    const buf = new Uint8Array(analyser.fftSize);
                    let baseline = 0.02;
                    let spikeCD  = 0;

                    function tick() {
                        if (!micStream) return; // stopMic() was called
                        analyser.getByteTimeDomainData(buf);
                        let sum = 0;
                        for (let i = 0; i < buf.length; i++) {
                            const v = (buf[i] - 128) / 128;
                            sum += v * v;
                        }
                        const rms = Math.sqrt(sum / buf.length);
                        baseline = baseline * 0.98 + rms * 0.02;
                        if (spikeCD > 0) { spikeCD--; }
                        else if (rms > Math.max(baseline * 4, 0.07)) {
                            triggerSpit();
                            spikeCD = 30;
                        }
                        micRafId = requestAnimationFrame(tick);
                    }
                    tick();
                    micState = 'listening';
                })
                .catch(() => { micState = 'off'; });
        }
        function stopMic() {
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
                micStream = null;
            }
            if (micCtx) {
                micCtx.close().catch(() => {});
                micCtx = null;
            }
            if (micRafId) cancelAnimationFrame(micRafId);
            micRafId = 0;
            micState = 'off';
        }
        // Start on first keyboard press OR first tap — whichever comes first
        document.addEventListener('keydown',   startMic, { once: true });
        document.addEventListener('touchstart', startMic, { once: true });

        // Release the mic whenever the tab is backgrounded; resume on return.
        // Permission is cached, so resuming doesn't re-prompt the user.
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopMic();
            else                 startMic();
        });

        // --- Input ---
        const keys = {};
        document.addEventListener('keydown', e => {
            // Mobile typing goes straight to the HTML input — don't intercept
            // (this handler's preventDefault would otherwise block characters
            // from reaching the input field).
            if (e.target === mobileInput) return;

            // Name input mode: capture typing
            if (state === 'name_input') {
                if (e.key === 'Escape') {
                    // Skip name + leaderboard, start a new game
                    hideMobileInput();
                    reset();
                } else if (e.key === 'Enter' && nameInput.trim().length > 0) {
                    lastName = nameInput.trim();
                    saveScore(lastName, score);
                    if (score > bestScore) bestScore = score;
                    state = 'leaderboard';
                } else if (e.key === 'Backspace') {
                    nameInput = nameInput.slice(0, -1);
                } else if (e.key.length === 1 && nameInput.length < 15) {
                    nameInput += e.key;
                }
                e.preventDefault();
                return;
            }

            if (state === 'leaderboard') {
                if (e.key === 'r' || e.key === 'R') reset();
                e.preventDefault();
                return;
            }

            const fresh = !keys[e.key];
            keys[e.key] = true;

            if (state === 'start') { reset(); return; }
            if (state !== 'playing') return;

            if (e.key === 't' || e.key === 'T') { spawnEnemy(camX + W + 160); return; }

            if (fresh && (e.key === 'ArrowUp' || e.key === ' ') && player.onGround) {
                player.vy = JUMP_V; player.onGround = false;
            }
            if (fresh && (e.key === 's' || e.key === 'S')) triggerSpit();
            if ([' ','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        // --- Touch controls ---
        const isTouch = navigator.maxTouchPoints > 0;

        // Only action buttons — movement uses half-screen tap zones instead
        // w:h matches the source image aspect ratio 318:184
        const VBTNS = [
            { id:'jump', x:60, y:H-89, w:130, h:Math.round(130*184/318) },
        ];

        function touchToGame(touch) {
            const r = canvas.getBoundingClientRect();
            return { x: (touch.clientX - r.left) * (W / r.width),
                     y: (touch.clientY - r.top)  * (H / r.height) };
        }
        function btnAt(gx, gy) {
            return VBTNS.filter(b => gx>=b.x && gx<=b.x+b.w && gy>=b.y && gy<=b.y+b.h);
        }
        function activeBtnIds(touches) {
            const ids = new Set();
            for (const t of touches) {
                const g = touchToGame(t);
                btnAt(g.x, g.y).forEach(b => ids.add(b.id));
            }
            return ids;
        }

        let prevTouchIds = new Set();
        function handleTouches(e) {
            e.preventDefault();
            if (state === 'start')       { reset(); return; }
            if (state === 'leaderboard') { reset(); return; }
            if (state === 'name_input') {
                let onDone = false, onBox = false;
                for (const t of e.touches) {
                    const g = touchToGame(t);
                    // Done button (matches what drawNameInput draws)
                    if (g.x >= W/2-65  && g.x <= W/2+65  && g.y >= 262 && g.y <= 300) onDone = true;
                    // Name input box
                    if (g.x >= W/2-160 && g.x <= W/2+160 && g.y >= 205 && g.y <= 247) onBox  = true;
                }
                if (onDone) { submitName(); return; }
                if (onBox)  { mobileInput.focus(); return; }
                // Tapped outside both — skip name + leaderboard, start a new game
                hideMobileInput();
                reset();
                return;
            }

            const curBtns = activeBtnIds(e.touches);
            let moveLeft = false, moveRight = false;

            for (const t of e.touches) {
                const g = touchToGame(t);
                const onBtn = btnAt(g.x, g.y).length > 0;
                if (!onBtn) {
                    if (g.x < W / 2) moveLeft  = true;
                    else             moveRight = true;
                }
            }

            // Fire actions on fresh button presses
            for (const id of curBtns) {
                if (!prevTouchIds.has(id)) {
                    if (id === 'jump' && player.onGround && state === 'playing') {
                        player.vy = JUMP_V; player.onGround = false;
                    }
                }
            }

            keys['ArrowLeft']  = moveLeft;
            keys['ArrowRight'] = moveRight;
            prevTouchIds = curBtns;
        }
        function handleTouchEnd(e) {
            e.preventDefault();
            const curBtns = activeBtnIds(e.touches);
            let moveLeft = false, moveRight = false;
            for (const t of e.touches) {
                const g = touchToGame(t);
                if (btnAt(g.x, g.y).length === 0) {
                    if (g.x < W / 2) moveLeft  = true;
                    else             moveRight = true;
                }
            }
            keys['ArrowLeft']  = moveLeft;
            keys['ArrowRight'] = moveRight;
            prevTouchIds = curBtns;
        }
        canvas.addEventListener('touchstart', handleTouches, { passive: false });
        canvas.addEventListener('touchmove',  handleTouches, { passive: false });
        canvas.addEventListener('touchend',   handleTouchEnd, { passive: false });

        // --- Mobile name input overlay ---
        // A real HTML overlay (input + Done button) sits above the canvas during
        // name entry. The overlay is fixed-positioned and not affected by the
        // visualViewport shrinking when the keyboard opens, so the controls stay
        // visible at the top of the screen.
        const mobileInput = document.getElementById('mobileNameInput');
        const nameOverlay = document.getElementById('nameOverlay');
        const nameScoreText = document.getElementById('nameScoreText');
        const doneBtn = document.getElementById('doneBtn');

        function showMobileInput() {
            if (!isTouch) return;
            nameInput = '';
            mobileInput.value = '';
            nameScoreText.textContent = `You splatted ${score} box${score===1?'':'es'}`;
            nameOverlay.style.display = 'block';
            // Delay focus until display:block has applied so iOS actually opens the keyboard
            setTimeout(() => mobileInput.focus(), 50);
        }
        function hideMobileInput() {
            nameOverlay.style.display = 'none';
            mobileInput.blur();
        }
        function submitName() {
            const name = mobileInput.value.trim();
            if (!name) return;
            nameInput = name;
            hideMobileInput();
            lastName = nameInput;
            saveScore(lastName, score);
            if (score > bestScore) bestScore = score;
            state = 'leaderboard';
        }

        // Keep nameInput in sync so the desktop canvas preview still works
        mobileInput.addEventListener('input', () => { nameInput = mobileInput.value; });
        // Enter / Return on the on-screen keyboard submits
        mobileInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); submitName(); }
        });
        // Done button — submit (stopPropagation so it doesn't trigger overlay-skip)
        doneBtn.addEventListener('click', e => { e.stopPropagation(); submitName(); });
        // Tap inside the input — keep focus, don't bubble to overlay-skip handler
        mobileInput.addEventListener('click', e => e.stopPropagation());
        // Tap anywhere else in the overlay — skip name + leaderboard, start new game
        nameOverlay.addEventListener('click', () => {
            hideMobileInput();
            reset();
        });

        // --- Collision helpers ---
        function playerBox() {
            return { l:player.wx-CHAR_W/2+8, r:player.wx+CHAR_W/2-8,
                     t:player.y-CHAR_H+14,   b:player.y-4 };
        }
        function obsBox(obs) {
            const gy=getGroundY(obs.wx);
            const w=obs.type==='corn'?CORN_W:BOX_W;
            const h=obs.type==='corn'?CORN_H:(obs.state==='hit'?BOX_H_AFTER:BOX_H);
            const lift=obs.lift||0;
            return { l:obs.wx, r:obs.wx+w, t:gy-h-lift, b:gy-lift, w, h };
        }
        function overlaps(ax1,ay1,ax2,ay2,bx1,by1,bx2,by2) {
            return ax2>bx1&&ax1<bx2&&ay2>by1&&ay1<by2;
        }

        // --- Update ---
        function update() {
            if (state === 'dying') {
                player.vy += GRAVITY;
                player.y  += player.vy;
                deathSpin  += 0.09;
                if (player.y > H + 120) { enterNameInput(); }
                return;
            }
            if (state !== 'playing') return;

            if (keys['ArrowRight']) { player.wx+=WALK_SPEED; player.facingRight=true; }
            if (keys['ArrowLeft'])  {
                player.wx-=WALK_SPEED; player.facingRight=false;
                if (player.wx<210) player.wx=210;
            }

            player.prevY=player.y;
            if (!player.onGround) player.vy+=GRAVITY;
            player.y+=player.vy;
            player.onGround=false;

            const terrainY=getGroundY(player.wx);
            if (player.y>=terrainY) {
                player.y=terrainY; player.vy=0; player.onGround=true;
            } else if (player.vy>=0 && terrainY-player.y<=8) {
                // Small downhill step — snap down so ground contact never flickers
                player.y=terrainY; player.vy=0; player.onGround=true;
            }

            camX=Math.max(0, player.wx-CAM_OFFSET);
            if (spitCD>0) spitCD--;
            gameFrames++;

            // Enemy wave timer — 20 s quiet, first wave, 10 s grace, then normal ramp
            if (doofTimer > 0) {
                doofTimer--;
            } else {
                spawnWave(camX + W + 160);
                if (waveCount === 1) {
                    doofTimer = 600; // 10 s gap after the very first wave
                } else {
                    const d = Math.min(1, gameFrames / WAVE_RAMP);
                    const minI = Math.round(WAVE_MIN_S + d * (WAVE_MIN_E - WAVE_MIN_S));
                    const maxI = Math.round(WAVE_MAX_S + d * (WAVE_MAX_E - WAVE_MAX_S));
                    doofTimer = minI + Math.floor(Math.random() * (maxI - minI));
                }
            }

            // Walk animation
            const isMoving = keys['ArrowRight'] || keys['ArrowLeft'];
            if (isMoving) {
                walkCycle += 0.28; // advance while moving, even mid-air
            } else if (player.onGround) {
                walkCycle = 0; // only reset when standing still on ground
            }

            // Lean forward in direction of movement, straighten when still or airborne
            const targetLean = (isMoving && player.onGround)
                ? (player.facingRight ? 0.13 : -0.13)
                : 0;
            leanAngle += (targetLean - leanAngle) * 0.18;

            // Squash on landing, then stretch back to normal
            if (!wasOnGround && player.onGround) squash = 0.72;
            if (squash < 1.0) squash += (1.0 - squash) * 0.22;
            wasOnGround = player.onGround;

            // Spit projectiles — pass through corn and already-spat boxes;
            // only fresh boxes and enemies block the spit. Hits only register
            // while the spit is inside the visible frame.
            for (let i=spits.length-1; i>=0; i--) {
                const s=spits[i];
                if (s.fading) {
                    s.alpha -= 0.07;
                    if (s.alpha<=0) spits.splice(i,1);
                    continue;
                }
                s.wx += SPIT_SPEED * s.dir;

                const onScreen = s.wx + SPIT_W >= camX && s.wx <= camX + W;
                let blocked = false;

                if (onScreen) {
                    // Fresh boxes only — corn and 'hit' boxes are transparent to spit
                    for (const obs of obstacles) {
                        if (obs.type!=='box' || obs.state!=='normal') continue;
                        const cb=obsBox(obs);
                        if (!overlaps(s.wx,s.y,s.wx+SPIT_W,s.y+SPIT_H,cb.l,cb.t,cb.r,cb.b)) continue;
                        obs.state='hit'; score++;
                        s.fading=true; blocked=true;
                        break;
                    }
                    // Enemies
                    if (!blocked) {
                        for (const e of enemies) {
                            if (e.hit) continue;
                            if (!overlaps(s.wx,s.y,s.wx+SPIT_W,s.y+SPIT_H,
                                          e.wx,e.y-e.H,e.wx+e.W,e.y)) continue;
                            e.hit=true; e.vy=-22; e.spin=0;
                            s.fading=true; blocked=true;
                            break;
                        }
                    }
                }
                if (!blocked && (s.wx-camX > W+60 || s.wx+SPIT_W < camX-60)) spits.splice(i,1);
            }

            // Enemies — move left, follow terrain, animate
            for (let i=enemies.length-1; i>=0; i--) {
                const e=enemies[i];
                e.wx -= ENEMY_SPEED;

                if (e.hit) {
                    e.vy += GRAVITY;
                    e.y  += e.vy;
                    e.spin += 0.10;
                    if (e.y > H + 150) { enemies.splice(i,1); }
                    continue;
                }

                e.y = getGroundY(e.wx);
                if (e.walk) {
                    e.walkCycle += 0.28;
                    e.leanAngle += (-0.13 - e.leanAngle) * 0.18;
                }
                if (e.wx + e.W < camX - 20) { enemies.splice(i,1); continue; }

                // Player vs enemy — must jump over
                const pb2=playerBox();
                const et=e.y-e.H, eb=e.y;
                if (overlaps(pb2.l,pb2.t,pb2.r,pb2.b, e.wx,et,e.wx+e.W,eb)) {
                    if (player.prevY-4 <= et+2 && player.vy>=0) {
                        // Stomp — launch enemy, bounce llama
                        e.hit=true; e.vy=-22; e.spin=0;
                        player.y=et; player.vy=-9; player.onGround=false;
                    } else {
                        killPlayer(); return;
                    }
                }
            }

            // Player vs obstacles — boxes are spit-only, so we only handle corn here
            const pb=playerBox();
            for (const obs of obstacles) {
                if (obs.type!=='corn') continue;
                const cb=obsBox(obs);
                if (!overlaps(pb.l,pb.t,pb.r,pb.b,cb.l,cb.t,cb.r,cb.b)) continue;
                // Corn: land on top or die
                const prevFeet=player.prevY-4;
                if (prevFeet<=cb.t+2 && player.vy>=0) {
                    player.y=cb.t+4; player.vy=0; player.onGround=true;
                } else {
                    killPlayer(); return;
                }
            }
        }

        // --- Draw helpers ---
        function drawFloor() {
            if (!floorImg.complete||!floorImg.naturalWidth) return;
            const startX=-(camX%FLOOR_W);
            for (let x=startX-FLOOR_W; x<W+FLOOR_W; x+=FLOOR_W)
                ctx.drawImage(floorImg,x,FLOOR_Y,FLOOR_W,FLOOR_H);
        }
        function drawObstacles() {
            for (const obs of obstacles) {
                const cb=obsBox(obs);
                const sx=obs.wx-camX;
                if (sx+cb.w<-10||sx>W+10) continue;
                if (obs.type==='corn') {
                    if (cornImg.complete&&cornImg.naturalWidth) ctx.drawImage(cornImg,sx,cb.t,CORN_W,CORN_H);
                    else { ctx.fillStyle='#FFD700'; ctx.fillRect(sx,cb.t,CORN_W,CORN_H); }
                } else {
                    const bImg=obs.state==='hit'?boxAfter:boxBefore;
                    if (bImg.complete&&bImg.naturalWidth) ctx.drawImage(bImg,sx,cb.t,BOX_W,cb.h);
                    else { ctx.fillStyle=obs.state==='hit'?'#90EE90':'#87CEEB'; ctx.fillRect(sx,cb.t,BOX_W,cb.h); }
                }
            }
        }
        function drawSpits() {
            for (const s of spits) {
                const sx = s.wx - camX;
                ctx.save();
                ctx.globalAlpha = s.alpha;
                if (salivaImg.complete && salivaImg.naturalWidth) {
                    if (s.dir === -1) {
                        // Flip around the centre of the spit sprite
                        ctx.translate(sx + SPIT_W/2, s.y + SPIT_H/2);
                        ctx.scale(-1, 1);
                        ctx.drawImage(salivaImg, -SPIT_W/2, -SPIT_H/2, SPIT_W, SPIT_H);
                    } else {
                        ctx.drawImage(salivaImg, sx, s.y, SPIT_W, SPIT_H);
                    }
                } else {
                    ctx.fillStyle = 'rgba(120,200,80,0.9)';
                    ctx.beginPath();
                    ctx.ellipse(sx+SPIT_W/2, s.y+SPIT_H/2, SPIT_W/2, SPIT_H/2, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }
        function drawPlayer() {
            const sx = player.wx - camX;
            const dying = state === 'dying';
            const bobY = dying ? 0 : Math.sin(walkCycle) * 3;

            ctx.save();
            ctx.translate(sx, player.y + bobY);
            ctx.rotate(dying ? deathSpin : leanAngle);
            ctx.scale(
                dying ? 1 : 1 + (1 - squash) * 0.45,
                dying ? 1 : squash
            );

            if (llamaImg.complete && llamaImg.naturalWidth) {
                if (player.facingRight) {
                    ctx.drawImage(llamaImg, -CHAR_W/2, -CHAR_H, CHAR_W, CHAR_H);
                } else {
                    ctx.scale(-1, 1);
                    ctx.drawImage(llamaImg, -CHAR_W/2, -CHAR_H, CHAR_W, CHAR_H);
                }
            } else {
                ctx.fillStyle = '#ccc';
                ctx.fillRect(-CHAR_W/2, -CHAR_H, CHAR_W, CHAR_H);
            }
            ctx.restore();
        }
        function drawEnemies() {
            for (const e of enemies) {
                const sx = e.wx - camX;
                if (sx + e.W < -10 || sx > W + 10) continue;
                const bobY = (e.hit || !e.walk) ? 0 : Math.sin(e.walkCycle) * 3;
                const rot  = e.hit ? e.spin : (e.walk ? e.leanAngle : 0);
                ctx.save();
                ctx.translate(sx + e.W/2, e.y + bobY);
                ctx.rotate(rot);
                if (e.img.complete && e.img.naturalWidth) {
                    ctx.drawImage(e.img, -e.W/2, -e.H, e.W, e.H);
                } else {
                    ctx.fillStyle='#f88';
                    ctx.fillRect(-e.W/2, -e.H, e.W, e.H);
                }
                ctx.restore();
            }
        }
        function drawHUD() {
            ctx.textAlign='right';
            ctx.font=`bold 22px ${FONT}`; ctx.fillStyle='#fff';
            ctx.fillText(`Score: ${score}`,W-18,34);
            ctx.font=`14px ${FONT}`; ctx.fillStyle='rgba(255,255,255,0.7)';
            ctx.fillText(`Best: ${bestScore}`,W-18,54);

            // Mic indicator — bottom-left
            if (micState !== 'unsupported') {
                const active = micState === 'listening';
                ctx.save();
                // Pulsing dot
                const pulse = active ? (0.7 + 0.3 * Math.sin(Date.now() / 200)) : 0.35;
                ctx.globalAlpha = pulse;
                ctx.fillStyle = active ? '#e03' : '#888';
                ctx.beginPath();
                ctx.arc(18, H - 18, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = pulse * 0.9;
                ctx.font = `11px ${FONT}`;
                ctx.textAlign = 'left';
                ctx.fillStyle = active ? '#e03' : '#888';
                ctx.fillText('ptiu!', 28, H - 14);
                ctx.restore();
            }
            ctx.textAlign='left';
        }

        // --- Name input screen ---
        function drawNameInput() {
            ctx.fillStyle='rgba(255,255,255,0.82)';
            ctx.fillRect(0,0,W,H);

            ctx.textAlign='center';

            ctx.font=`bold 46px ${FONT}`; ctx.fillStyle='#111';
            ctx.fillText('SPLAT!',W/2,90);

            ctx.font=`20px ${FONT}`; ctx.fillStyle='#444';
            ctx.fillText(`You splatted ${score} box${score!==1?'es':''}`,W/2,135);

            ctx.font=`16px ${FONT}`; ctx.fillStyle='#666';
            ctx.fillText('Enter your name:',W/2,190);

            // Input box — shown on both desktop and mobile
            const bw=320, bh=42, bx=W/2-bw/2, by=205;
            ctx.fillStyle='#f9f9f9';
            ctx.strokeStyle='#333'; ctx.lineWidth=2;
            ctx.fillRect(bx,by,bw,bh);
            ctx.strokeRect(bx,by,bw,bh);
            const cursor = Math.floor(Date.now()/500)%2 ? '|' : '';
            ctx.font=`20px ${FONT}`; ctx.fillStyle='#111';
            ctx.fillText(nameInput+cursor, W/2, by+28);

            if (!isTouch) {
                ctx.font=`13px ${FONT}`; ctx.fillStyle='#aaa';
                ctx.fillText('Press ENTER to confirm  ·  ESC to skip', W/2, 280);
            } else {
                // Done button
                const dbx=W/2-65, dby=262, dbw=130, dbh=38;
                ctx.fillStyle='#111';
                ctx.beginPath(); ctx.roundRect(dbx,dby,dbw,dbh,8); ctx.fill();
                ctx.fillStyle='#fff'; ctx.font=`bold 16px ${FONT}`;
                ctx.fillText('Done  ✓', W/2, dby+25);
                ctx.font=`12px ${FONT}`; ctx.fillStyle='#aaa';
                ctx.fillText('or tap keyboard Done  ·  tap outside to skip', W/2, 318);
            }

            ctx.textAlign='left';
        }

        // --- Leaderboard screen ---
        function drawLeaderboard() {
            ctx.fillStyle='rgba(255,255,255,0.92)';
            ctx.fillRect(0,0,W,H);

            const board=getLeaderboard();
            ctx.textAlign='center';

            ctx.font=`bold 32px ${FONT}`; ctx.fillStyle='#111';
            ctx.fillText('LEADERBOARD',W/2,46);

            // Separator line
            ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(160,58); ctx.lineTo(740,58); ctx.stroke();

            // Header
            ctx.font=`12px ${FONT}`; ctx.fillStyle='#aaa';
            ctx.fillText('#    NAME              SCORE',W/2,76);

            const medals=['🥇','🥈','🥉'];
            for (let i=0; i<board.length; i++) {
                const { name, score:s }=board[i];
                const y=98+i*30;
                const isMe=(s===score && name===lastName);

                if (isMe) {
                    ctx.fillStyle='rgba(255,240,180,0.7)';
                    ctx.fillRect(160,y-18,580,24);
                }

                // Rank colour
                ctx.fillStyle=i===0?'#B8860B':i===1?'#777':i===2?'#8B4513':'#333';
                ctx.font=(isMe?`bold 16px ${FONT}`:`15px ${FONT}`);

                const rank=(i<3?medals[i]:`${String(i+1).padStart(2)}.`).padEnd(4);
                const nameCol=name.substring(0,14).padEnd(14);
                const scoreCol=String(s).padStart(5);
                ctx.fillText(`${rank}  ${nameCol}  ${scoreCol}`,W/2,y);
            }

            if (board.length===0) {
                ctx.font=`16px ${FONT}`; ctx.fillStyle='#aaa';
                ctx.fillText('No scores yet!',W/2,130);
            }

            // Footer
            ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(160,H-38); ctx.lineTo(740,H-38); ctx.stroke();
            ctx.font=`13px ${FONT}`; ctx.fillStyle='#888';
            ctx.fillText('Press  R  to play again',W/2,H-16);

            ctx.textAlign='left';
        }

        // --- Start overlay ---
        function drawStartOverlay() {
            ctx.fillStyle='rgba(255,255,255,0.80)';
            ctx.fillRect(0,0,W,H);
            ctx.textAlign='center';
            ctx.font=`40px 'Spicy Rice', cursive`; ctx.fillStyle='#8c1717';
            ctx.fillText('FULGI FLAVIA FOREVER',W/2,H/2-30);
            ctx.font=`18px ${FONT}`; ctx.fillStyle='#444';
            ctx.fillText('← → move  |  SPACE jump',W/2,H/2+14);
            ctx.font=`bold 18px ${FONT}`; ctx.fillStyle='#0bc4fc';
            ctx.fillText('Say "PTIU" to spit', W/2, H/2+40);
            ctx.font=`14px ${FONT}`; ctx.fillStyle='#888';
            ctx.fillText('Spit the boxes · jump the corn · press any key to start',W/2,H/2+66);
            ctx.textAlign='left';
        }

        function drawTouchButtons() {
            ctx.save();
            const b = VBTNS[0]; // jump only
            ctx.globalAlpha = 0.85;
            if (jumpBtnImg.complete && jumpBtnImg.naturalWidth) {
                ctx.drawImage(jumpBtnImg, b.x, b.y, b.w, b.h);
            } else {
                ctx.fillStyle = '#0bc4fc';
                ctx.beginPath();
                ctx.roundRect(b.x, b.y, b.w, b.h, 14);
                ctx.fill();
            }
            ctx.restore();
        }

        // --- Main draw ---
        function draw() {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            if (bgPattern) {
                const offset = ((-(camX * 0.2)) % bgTileW + bgTileW) % bgTileW;
                bgPattern.setTransform(new DOMMatrix().translate(offset, 0));
                ctx.fillStyle = bgPattern;
                ctx.fillRect(0, 0, W, H);
            } else { ctx.fillStyle='#b0b8c0'; ctx.fillRect(0,0,W,H); }
            drawFloor();
            drawObstacles();
            drawSpits();
            drawPlayer();
            drawEnemies();
            drawHUD();
            if (isTouch) drawTouchButtons();

            if (state==='start')            drawStartOverlay();
            else if (state==='name_input')  drawNameInput();
            else if (state==='leaderboard') drawLeaderboard();

            // "Say PTIU" snackbar — visible for first 10 s, fades out in last 2 s
            if ((state==='playing' || state==='dying') && gameFrames < 600) {
                const alpha = gameFrames < 480 ? 1 : 1 - (gameFrames - 480) / 120;
                const text = 'Say "PTIU" to spit';
                ctx.save();
                ctx.font = `bold 21px ${FONT}`;
                const tw = ctx.measureText(text).width + 45;
                const th = 45, ty = 10;
                ctx.globalAlpha = alpha * 0.88;
                ctx.fillStyle = '#8c1717';
                ctx.beginPath();
                ctx.roundRect(W/2 - tw/2, ty, tw, th, 9);
                ctx.fill();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, W/2, ty + th/2);
                ctx.textBaseline = 'alphabetic';
                ctx.restore();
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        function startWhenReady() {
            if (allImages.every(img => img.complete)) {
                initPlayer();
                spawnObstacles();
                loop();
            } else {
                ctx.fillStyle = '#b0b8c0';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#333';
                ctx.font = `bold 20px ${FONT}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Loading…', W / 2, H / 2);
                ctx.textBaseline = 'alphabetic';
                requestAnimationFrame(startWhenReady);
            }
        }
        startWhenReady();
    </script>
</body>
</html>
